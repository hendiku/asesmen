<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menghubungkan ke Server...</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Background Animation */
        .bg-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.5;
            }

            100% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }

        /* Glass Card */
        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 3rem;
            border-radius: 2rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Loader Animation */
        .loader {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            position: relative;
        }

        .loader div {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid transparent;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        .loader div:nth-child(2) {
            border-top-color: var(--secondary);
            animation-delay: -0.3s;
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 300;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-top: 2rem;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            box-shadow: 0 0 10px var(--primary);
            transition: width 2s linear;
        }

        /* Link Box Styles */
        .link-box {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
        }

        .link-box input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 0.8rem;
            color: #94a3b8;
            font-size: 0.8rem;
            width: 100%;
            outline: none;
            text-align: center;
        }

        .link-box button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .link-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px var(--primary);
            filter: brightness(1.1);
        }

        .instructions {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 0.8rem;
            border-left: 3px solid var(--primary);
        }

        .instructions p {
            font-size: 0.8rem;
            line-height: 1.4;
            color: #cbd5e1;
        }

        /* Footer Status */
        .status {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>

    <div class="container">
        <div class="loader">
            <div></div>
            <div></div>
        </div>


        <div class="link-box">
            <input type="text" id="scriptLink"
                value="https://script.google.com/macros/s/AKfycbzpWsyEEYsBmftlkeC44baA84pvy-0nHcu1QIZYDdz0TC-2SGuK5b5YpQcVya7rQO_G/exec"
                readonly>

        </div>


    </div>

    <script>
        function copyLink() {
            const linkInput = document.getElementById('scriptLink');
            const btn = document.getElementById('copyBtn');

            linkInput.select();
            linkInput.setSelectionRange(0, 99999); // Untuk mobile

            navigator.clipboard.writeText(linkInput.value).then(() => {
                const originalText = btn.innerText;
                btn.innerText = "Tersalin!";
                btn.style.background = "#22c55e";

                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = "var(--primary)";
                }, 2000);
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            // Animasi progress bar (jika masih ingin ada efek loading di awal)
            // Namun kita biarkan halaman statis agar user bisa menyalin link
        });
    </script>
</body>

</html>
